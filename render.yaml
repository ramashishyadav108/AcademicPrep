envVarGroups:
  - name: academix-shared
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: INTERNAL_SERVICE_SECRET
        sync: false

  - name: academix-cloudinary
    envVars:
      - key: CLOUD_NAME
        value: dfocfto1r
      - key: API_KEY
        sync: false
      - key: API_SECRET
        sync: false

  - name: academix-mail
    envVars:
      - key: MAILJET_API_KEY
        sync: false
      - key: MAILJET_SECRET_KEY
        sync: false
      - key: MAIL_FROM
        sync: false

services:
  # ─── API GATEWAY ──────────────────────────────────────────────
  - type: web
    name: academix-api-gateway
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend/api-gateway && node server.js
    envVars:
      - fromGroup: academix-shared
      - key: CORS_ORIGINS
        value: https://academix-sigma.vercel.app
      - key: USER_SERVICE_URL
        value: https://academix-user-service.onrender.com
      - key: COURSE_SERVICE_URL
        value: https://academix-course-service.onrender.com
      - key: PAYMENT_SERVICE_URL
        value: https://academix-payment-service.onrender.com
      - key: AI_SERVICE_URL
        value: https://academix-ai-service.onrender.com

  # ─── USER SERVICE ─────────────────────────────────────────────
  - type: web
    name: academix-user-service
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend/user-service && node server.js
    envVars:
      - fromGroup: academix-shared
      - fromGroup: academix-cloudinary
      - fromGroup: academix-mail
      - key: FOLDER_NAME
        value: study_notion_user
      - key: ADMIN_MAIL
        sync: false
      - key: CORS_ORIGINS
        value: https://academix-api-gateway.onrender.com
      - key: COURSE_SERVICE_URL
        value: https://academix-course-service.onrender.com
      - key: PAYMENT_SERVICE_URL
        value: https://academix-payment-service.onrender.com
      - key: API_GATEWAY_URL
        value: https://academix-api-gateway.onrender.com
      - key: FRONTEND_URL
        value: https://academix-sigma.vercel.app

  # ─── COURSE SERVICE ───────────────────────────────────────────
  - type: web
    name: academix-course-service
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend/course-service && node server.js
    envVars:
      - fromGroup: academix-shared
      - fromGroup: academix-cloudinary
      - key: FOLDER_NAME
        value: study_notion_course
      - key: CORS_ORIGINS
        value: https://academix-api-gateway.onrender.com
      - key: API_GATEWAY_URL
        value: https://academix-api-gateway.onrender.com
      - key: USER_SERVICE_URL
        value: https://academix-user-service.onrender.com

  # ─── PAYMENT SERVICE ──────────────────────────────────────────
  - type: web
    name: academix-payment-service
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend/payment-service && node server.js
    envVars:
      - fromGroup: academix-shared
      - fromGroup: academix-mail
      - key: RAZORPAY_KEY
        sync: false
      - key: RAZORPAY_SECRET
        sync: false
      - key: COURSE_SERVICE_URL
        value: https://academix-course-service.onrender.com
      - key: USER_SERVICE_URL
        value: https://academix-user-service.onrender.com
      - key: MAX_RETRY_ATTEMPTS
        value: "3"
      - key: RETRY_DELAY_BASE
        value: "1000"
      - key: RETRY_DELAY_MAX
        value: "8000"
      - key: CORS_ORIGINS
        value: https://academix-api-gateway.onrender.com

  # ─── AI SERVICE ───────────────────────────────────────────────
  - type: web
    name: academix-ai-service
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend/ai-service && node server.js
    envVars:
      - fromGroup: academix-shared
      - key: GEMINI_API_KEY
        sync: false
      - key: FOLDER_NAME
        value: study_notion_ai
      - key: CORS_ORIGINS
        value: https://academix-api-gateway.onrender.com
      - key: API_GATEWAY_URL
        value: https://academix-api-gateway.onrender.com/api/v1
